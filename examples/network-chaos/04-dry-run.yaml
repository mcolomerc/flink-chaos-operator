# Example: Dry run for NetworkChaos — validate target without injecting tc rules.
#
apiVersion: chaos.flink.io/v1alpha1
kind: ChaosRun
metadata:
  name: netchaos-dryrun
  namespace: vvp-jobs
spec:
  target:
    type: PodSelector
    selector:
      matchLabels:
        component: taskmanager
        system: ververica-platform

  scenario:
    type: NetworkChaos
    network:
      target: TMtoJM
      direction: Both
      latency: 200ms
      duration: 30s

  safety:
    dryRun: true
    minTaskManagersRemaining: 0
    allowSharedClusterImpact: true
