{{- if .Values.installCRD | default true }}
# The ChaosRun CRD. Set installCRD=false to skip if managing CRDs separately.
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: chaosruns.chaos.flink.io
spec:
  group: chaos.flink.io
  names:
    kind: ChaosRun
    listKind: ChaosRunList
    plural: chaosruns
    shortNames:
    - cr
    - chaosrun
    singular: chaosrun
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.verdict
      name: Verdict
      type: string
    - jsonPath: .status.targetSummary.name
      name: Target
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ChaosRun is the Schema for the chaosruns API.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: ChaosRunSpec defines the desired chaos experiment.
            properties:
              control:
                description: Control provides runtime signals for an in-flight run.
                properties:
                  abort:
                    description: Abort requests an immediate stop of the ChaosRun.
                    type: boolean
                type: object
              observe:
                description: Observe configures the post-injection observation phase.
                properties:
                  enabled:
                    type: boolean
                  flinkRest:
                    properties:
                      checkpointStableWindowSeconds:
                        minimum: 1
                        type: integer
                      checkpointWaitTimeout:
                        type: string
                      enabled:
                        type: boolean
                      endpoint:
                        type: string
                      requireStableCheckpointBeforeInject:
                        type: boolean
                    type: object
                  pollInterval:
                    type: string
                  timeout:
                    type: string
                type: object
              safety:
                description: Safety defines guardrails that prevent unsafe executions.
                properties:
                  allowCheckpointStorageChaos:
                    type: boolean
                  allowSharedClusterImpact:
                    type: boolean
                  dryRun:
                    type: boolean
                  maxConcurrentRunsPerTarget:
                    minimum: 1
                    type: integer
                  maxNetworkChaosDuration:
                    type: string
                  maxResourceExhaustionDuration:
                    type: string
                  minTaskManagersRemaining:
                    minimum: 0
                    type: integer
                type: object
              scenario:
                description: Scenario describes the chaos scenario to execute.
                properties:
                  action:
                    description: Action defines the disruptive action for TaskManagerPodKill.
                    properties:
                      gracePeriodSeconds:
                        format: int64
                        minimum: 0
                        type: integer
                      type:
                        enum:
                        - DeletePod
                        type: string
                    required:
                    - type
                    type: object
                  network:
                    description: Network describes disruption parameters for NetworkPartition and NetworkChaos.
                    properties:
                      bandwidth:
                        description: Maximum egress rate (e.g. "10mbit"). NetworkChaos TMtoExternal only.
                        type: string
                      direction:
                        description: Traffic directions affected.
                        enum:
                        - Ingress
                        - Egress
                        - Both
                        type: string
                      duration:
                        description: How long the disruption remains active. Defaults to 60s.
                        type: string
                      externalEndpoint:
                        description: Remote endpoint for TMtoCheckpoint or TMtoExternal targets.
                        properties:
                          cidr:
                            description: IP block of the external endpoint (e.g. "10.200.0.0/16").
                            type: string
                          hostname:
                            description: DNS name for the external endpoint (NetworkChaos only).
                            type: string
                          port:
                            description: Restrict chaos to a single destination port.
                            maximum: 65535
                            minimum: 1
                            type: integer
                        type: object
                      jitter:
                        description: Random variation added to delay (e.g. "20ms"). Requires latency.
                        type: string
                      latency:
                        description: Fixed one-way delay to inject (e.g. "100ms"). NetworkChaos only.
                        type: string
                      loss:
                        description: Percentage of packets to drop (0-100). NetworkChaos only.
                        maximum: 100
                        minimum: 0
                        type: integer
                      target:
                        description: Flink component pair to disrupt.
                        enum:
                        - TMtoTM
                        - TMtoJM
                        - TMtoCheckpoint
                        - TMtoExternal
                        type: string
                    required:
                    - target
                    type: object
                  resourceExhaustion:
                    description: ResourceExhaustion configures CPU or memory stress injection.
                    properties:
                      duration:
                        description: How long the stress injection runs. Defaults to 60s.
                        type: string
                      memoryPercent:
                        description: Percentage of pod memory limit to consume (1-100). Memory mode only.
                        maximum: 100
                        minimum: 1
                        type: integer
                      mode:
                        description: Whether CPU or Memory is exhausted.
                        enum:
                        - CPU
                        - Memory
                        type: string
                      workers:
                        description: Number of stress-ng worker goroutines. Defaults to 1.
                        minimum: 1
                        type: integer
                    required:
                    - mode
                    type: object
                  selection:
                    description: Selection controls which pods are disrupted. Used by TaskManagerPodKill.
                    properties:
                      count:
                        minimum: 1
                        type: integer
                      mode:
                        enum:
                        - Random
                        - Explicit
                        type: string
                      podNames:
                        items:
                          type: string
                        type: array
                    type: object
                  type:
                    enum:
                    - TaskManagerPodKill
                    - NetworkPartition
                    - NetworkChaos
                    - ResourceExhaustion
                    type: string
                required:
                - type
                type: object
              target:
                description: Target identifies the Flink workload to disrupt.
                properties:
                  deploymentId:
                    type: string
                  deploymentName:
                    type: string
                  name:
                    type: string
                  selector:
                    description: A label selector is a label query over a set of resources.
                    properties:
                      matchExpressions:
                        items:
                          properties:
                            key:
                              type: string
                            operator:
                              type: string
                            values:
                              items:
                                type: string
                              type: array
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                      matchLabels:
                        additionalProperties:
                          type: string
                        type: object
                    type: object
                  type:
                    enum:
                    - FlinkDeployment
                    - VervericaDeployment
                    - PodSelector
                    type: string
                  vvpNamespace:
                    type: string
                required:
                - type
                type: object
            required:
            - scenario
            - target
            type: object
          status:
            description: ChaosRunStatus describes the observed state of a ChaosRun.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              endedAt:
                format: date-time
                type: string
              ephemeralContainerInjections:
                description: Records of ephemeral containers injected for NetworkChaos.
                items:
                  properties:
                    containerName:
                      type: string
                    injectedAt:
                      format: date-time
                      type: string
                    podName:
                      type: string
                  required:
                  - containerName
                  - podName
                  type: object
                type: array
              injectedPods:
                items:
                  type: string
                type: array
              message:
                type: string
              observation:
                properties:
                  jobStateAfter:
                    type: string
                  jobStateBefore:
                    type: string
                  recoveryObservedAt:
                    format: date-time
                    type: string
                  taskManagerCountAfter:
                    type: integer
                  taskManagerCountBefore:
                    type: integer
                type: object
              observingStartedAt:
                format: date-time
                type: string
              phase:
                enum:
                - Pending
                - Validating
                - Injecting
                - Observing
                - CleaningUp
                - Completed
                - Aborted
                - Failed
                type: string
              replacementObserved:
                type: boolean
              resourceExhaustionInjections:
                description: Records of ephemeral containers injected for ResourceExhaustion.
                items:
                  properties:
                    containerName:
                      type: string
                    injectedAt:
                      format: date-time
                      type: string
                    podName:
                      type: string
                  required:
                  - containerName
                  - podName
                  type: object
                type: array
              selectedPods:
                items:
                  type: string
                type: array
              startedAt:
                format: date-time
                type: string
              targetSummary:
                properties:
                  name:
                    type: string
                  type:
                    type: string
                required:
                - name
                - type
                type: object
              verdict:
                enum:
                - Passed
                - Failed
                - Inconclusive
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
