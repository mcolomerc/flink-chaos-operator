name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # create GitHub release and upload assets
  packages: write   # not strictly needed for Docker Hub but kept for future

jobs:
  # -------------------------------------------------------------------------
  # 1. Run tests before building anything
  # -------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test -race -count=1 ./...

  # -------------------------------------------------------------------------
  # 2. Build and push multi-arch operator image to Docker Hub
  # -------------------------------------------------------------------------
  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: mcolomervv/flink-chaos-operator
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # 3. Build CLI binaries for all supported platforms
  # -------------------------------------------------------------------------
  cli:
    name: Build CLI Binaries
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build kubectl-fchaos
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o kubectl-fchaos-${{ matrix.suffix }}${{ matrix.ext || '' }} \
            ./cmd/kubectl-fchaos

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.suffix }}
          path: kubectl-fchaos-${{ matrix.suffix }}${{ matrix.ext || '' }}
          retention-days: 1

  # -------------------------------------------------------------------------
  # 4. Package Helm chart
  # -------------------------------------------------------------------------
  helm:
    name: Package Helm Chart
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Update chart app version
        run: |
          VERSION=${{ github.ref_name }}
          # Strip leading 'v' for appVersion
          APP_VERSION="${VERSION#v}"
          sed -i "s/^appVersion:.*/appVersion: \"${APP_VERSION}\"/" charts/flink-chaos-operator/Chart.yaml
          sed -i "s/^version:.*/version: ${APP_VERSION}/" charts/flink-chaos-operator/Chart.yaml

      - name: Package chart
        run: helm package charts/flink-chaos-operator --destination .

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: flink-chaos-operator-*.tgz
          retention-days: 1

  # -------------------------------------------------------------------------
  # 5. Create GitHub Release and attach all assets
  # -------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, cli, helm]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git log changelog generation

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "${{ github.ref_name }}" | head -1)
          if [ -z "$PREVIOUS_TAG" ]; then
            RANGE="${{ github.ref_name }}"
            LOG=$(git log --pretty=format:"- %s (%h)" "${RANGE}")
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}".."${{ github.ref_name }}")
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          body: |
            ## Flink Chaos Operator ${{ github.ref_name }}

            ### Docker Image

            ```bash
            docker pull mcolomervv/flink-chaos-operator:${{ github.ref_name }}
            ```

            ### Install with Helm

            ```bash
            helm install fchaos oci://registry-1.docker.io/mcolomervv/flink-chaos-operator \
              --version ${{ github.ref_name }} \
              --namespace streaming --create-namespace
            ```

            Or using the chart tarball attached below:

            ```bash
            helm install fchaos flink-chaos-operator-${{ github.ref_name }}.tgz \
              --namespace streaming --create-namespace
            ```

            ### Install kubectl plugin

            Download the binary for your platform from the assets below, rename it to
            `kubectl-fchaos`, and place it on your `PATH`.

            ### Changes

            ${{ steps.changelog.outputs.changelog }}
          files: |
            dist/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false
