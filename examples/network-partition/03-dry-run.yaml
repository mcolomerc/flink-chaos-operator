# Example: Dry run for NetworkPartition — validate without creating any policies.
#
apiVersion: chaos.flink.io/v1alpha1
kind: ChaosRun
metadata:
  name: netpart-dryrun
  namespace: vvp-jobs
spec:
  target:
    type: PodSelector
    selector:
      matchLabels:
        component: taskmanager
        system: ververica-platform

  scenario:
    type: NetworkPartition
    network:
      target: TMtoJM
      direction: Both
      duration: 30s

  safety:
    dryRun: true
    minTaskManagersRemaining: 0
    allowSharedClusterImpact: true
