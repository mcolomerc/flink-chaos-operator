{{- if .Values.ui.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "flink-chaos-operator.fullname" . }}-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flink-chaos-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "flink-chaos-operator.fullname" . }}-ui
subjects:
  - kind: ServiceAccount
    name: {{ include "flink-chaos-operator.fullname" . }}-ui
    namespace: {{ .Release.Namespace }}
{{- end }}
