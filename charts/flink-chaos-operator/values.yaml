replicaCount: 1

image:
  repository: mcolomervv/flink-chaos-operator
  pullPolicy: IfNotPresent
  tag: ""  # defaults to Chart.appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# namespace restricts the operator to a single namespace.
# When empty, the operator watches all namespaces (requires ClusterRole, not supported in MVP).
# Set this to the namespace where Flink workloads run.
watchNamespace: ""

metrics:
  enabled: true
  port: 8080
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s

defaults:
  observe:
    timeout: 10m
    pollInterval: 5s
  safety:
    maxConcurrentRunsPerTarget: 1
    minTaskManagersRemaining: 1
    allowSharedClusterImpact: false
    maxNetworkChaosDuration: 5m
    allowCheckpointStorageChaos: false

features:
  ververicaResolver: true
  podSelectorTarget: true
  networkChaos: true
  networkPartition: true

networkchaos:
  # tcImage is the container image used for ephemeral tc(8) injection containers.
  # Built from hack/Dockerfile.tc-tools and published as part of each release.
  # Override to use a custom image with iproute2/tc installed.
  tcImage: mcolomervv/flink-chaos-tc-tools:latest

resourceExhaustion:
  # stressImage is the container image used for ephemeral stress-ng injection containers.
  # Built from hack/Dockerfile.stress-tools and published as part of each release.
  # Override to use a custom image with stress-ng installed.
  stressImage: mcolomervv/flink-chaos-stress-tools:latest

logging:
  level: info

leaderElect: false

installCRD: true

# ── Web UI ─────────────────────────────────────────────────────────────────
ui:
  # enabled: deploy the flink-chaos-ui-server alongside the operator.
  enabled: false

  image:
    repository: mcolomervv/flink-chaos-ui-server
    pullPolicy: IfNotPresent
    tag: ""  # defaults to Chart.appVersion

  # flinkEndpoint: override the Flink REST URL (e.g. "http://my-jm:8081").
  # When empty the UI auto-discovers services labeled component=jobmanager.
  flinkEndpoint: ""

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: false
    className: nginx
    host: flink-chaos-ui.localhost
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
